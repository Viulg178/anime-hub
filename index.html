<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRURO.tv - Ultimate Private Stream</title>
    <style>
        :root {
            --bg-main: #0b0c0f;
            --bg-card: #13151a;
            --bg-border: #1f232b;
            --accent: #a855f7;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: #050507;
            border-bottom: 1px solid var(--bg-border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .logo { font-weight: 900; font-size: 20px; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-item { cursor: pointer; font-weight: 600; color: var(--text-muted); }
        .nav-item.active { color: var(--accent); }
        .search-bar {
            background: #13151a;
            border: 1px solid var(--bg-border);
            padding: 8px 15px;
            border-radius: 20px;
            width: 320px;
            color: white;
            font-size: 13px;
            outline: none;
        }
        .search-bar:focus { border-color: var(--accent); }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }
        .hero-banner {
            background: linear-gradient(180deg, rgba(19,21,26,0.4) 0%, rgba(11,12,15,1) 100%), #13151a;
            background-size: cover;
            background-position: center;
            height: 320px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--bg-border);
        }
        .hero-title { font-size: 28px; font-weight: 800; margin: 0 0 5px 0; color: white; }
        .hero-desc { font-size: 13px; color: var(--text-muted); max-width: 650px; line-height: 1.5; margin-bottom: 15px; }
        .btn-purple { background: var(--accent); color: white; border: none; padding: 10px 22px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .section-header { font-size: 18px; font-weight: bold; margin: 25px 0 15px 0; border-bottom: 1px solid var(--bg-border); padding-bottom: 8px; }
        .releases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 15px; }
        .release-card { background: var(--bg-card); border: 1px solid var(--bg-border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
        .release-card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .poster-box { height: 220px; background: #1f232b; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; }
        .release-info { padding: 10px; font-size: 13px; }
        .release-info h4 { margin: 0 0 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; }
        .release-meta { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; }
        .schedule-list { display: flex; flex-direction: column; gap: 8px; }
        .schedule-item { background: var(--bg-card); border: 1px solid var(--bg-border); border-radius: 6px; padding: 12px 20px; display: flex; justify-content: space-between; font-size: 14px; }
        .schedule-time { color: var(--accent); font-weight: bold; font-family: monospace; }
        .theater-layout { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        .theater-left { flex: 1; min-width: 60%; }
        .theater-right { width: 360px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; }
        @media (max-width: 1000px) { .theater-right { width: 100%; } }
        .video-box { background: #000; width: 100%; border-radius: 8px; overflow: hidden; border: 1px solid var(--bg-border); }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .stream-meta-bar { padding: 15px 0; border-bottom: 1px solid var(--bg-border); }
        .stream-title { font-size: 20px; font-weight: bold; margin: 0 0 8px 0; color: white; }
        .selectors-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        select { background: var(--bg-card); border: 1px solid var(--bg-border); color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; outline: none; font-size: 13px; }
        .sidebar-panel { background: var(--bg-card); border: 1px solid var(--bg-border); border-radius: 8px; padding: 15px; }
        .panel-title { font-size: 14px; font-weight: bold; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; border-bottom: 1px solid var(--bg-border); padding-bottom: 6px; }
        .vertical-episodes-list { max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .v-ep-card { background: var(--bg-main); border: 1px solid var(--bg-border); border-radius: 6px; padding: 8px; display: flex; gap: 10px; cursor: pointer; transition: all 0.2s; }
        .v-ep-card:hover, .v-ep-card.active { border-color: var(--accent); background: #151821; }
        .v-ep-thumb { width: 80px; height: 48px; border-radius: 4px; object-fit: cover; background: #1f232b; flex-shrink: 0; }
        .v-ep-info { overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        .v-ep-info h5 { margin: 0 0 2px 0; font-size: 12px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .v-ep-info p { margin: 0; font-size: 10px; color: var(--text-muted); }
        .seasons-row-list { display: flex; gap: 8px; flex-wrap: wrap; }
        .season-btn { background: var(--bg-main); border: 1px solid var(--bg-border); color: var(--text-muted); padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .season-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .info-card-block { background: var(--bg-card); border: 1px solid var(--bg-border); border-radius: 8px; padding: 20px; margin-top: 20px; display: flex; gap: 20px; }
        .info-poster { width: 140px; height: 200px; border-radius: 6px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--bg-border); }
        .info-details { font-size: 13px; line-height: 1.5; }
        .info-tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
        .tag-pill { background: #242833; color: #e2e8f0; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .comments-section { background: var(--bg-card); border: 1px solid var(--bg-border); border-radius: 8px; padding: 20px; margin-top: 25px; }
        .comment-input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-input-box input { flex: 1; background: var(--bg-main); border: 1px solid var(--bg-border); padding: 10px; color: white; border-radius: 6px; outline: none; }
        .comment-item { display: flex; gap: 12px; font-size: 13px; border-bottom: 1px solid var(--bg-border); padding-bottom: 12px; margin-bottom: 12px; }
        .comment-avatar { width: 35px; height: 35px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')">MIRURO<span>.tv</span></div>
        <input type="text" class="search-bar" placeholder="Search Anime library..." onkeyup="searchLibrary(event)">
        <div class="nav-links">
            <div class="nav-item active" id="tab-home" onclick="showPage('home')">Home</div>
            <div class="nav-item" id="tab-watch" onclick="showPage('watch')">Watch Panel</div>
        </div>
    </nav>

    <div class="container">
        <div class="page active" id="page-home">
            <div class="hero-banner" id="heroElement">
                <h1 class="hero-title" id="heroTitle">Loading...</h1>
                <p class="hero-desc" id="heroDesc">Loading private tracking node details...</p>
                <div><button class="btn-purple" onclick="quickWatchHero()">WATCH NOW</button></div>
            </div>
            <div class="section-header">Recently Uploaded Content</div>
            <div class="releases-grid" id="recentGrid"></div>
            <div class="section-header">Estimated Airing Schedule</div>
            <div class="schedule-list" id="scheduleList"></div>
        </div>

        <div class="page" id="page-watch">
            <div class="theater-layout">
                <div class="theater-left">
                    <div class="video-box">
                        <video id="mainPlayer" controls></video>
                    </div>
                    <div class="stream-meta-bar">
                        <h2 class="stream-title" id="playerStreamTitle">Select an Episode</h2>
                        <p id="playerEpisodeDesc" style="font-size: 13px; color: var(--text-muted); line-height: 1.5; margin: 0;"></p>
                        <div class="selectors-row">
                            <select id="audioSelect" onchange="syncAudioTrackChange()">
                                <option value="sub">Audio: Subbed (JPN)</option>
                                <option value="dub">Audio: Dubbed (ENG)</option>
                            </select>
                        </div>
                    </div>
                    <div class="info-card-block">
                        <img class="info-poster" id="metaPoster" src="" referrerpolicy="no-referrer" onerror="this.src='https://images.justwatch.com/poster/308930987/s332/season-1.webp'" alt="poster">
                        <div class="info-details">
                            <h3 id="metaTitle" style="margin:0; font-size:18px; color:white;">Anime Title</h3>
                            <div class="info-tags">
                                <span class="tag-pill">Action</span><span class="tag-pill">Drama</span><span class="tag-pill">Mystery</span>
                            </div>
                            <p id="metaSynopsis" style="color: var(--text-muted); margin: 10px 0; font-size: 12px;"></p>
                            <div style="font-size: 12px; color: white; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                                <div>Format: <span style="color:var(--text-muted);" id="metaFormat">TV</span></div>
                                <div>Year: <span style="color:var(--text-muted);" id="metaYear">2023</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="comments-section">
                        <h3>The Anime Community Comments</h3>
                        <div class="comment-input-box">
                            <input type="text" id="commentInput" placeholder="Leave a comment on this episode...">
                            <button class="btn-purple" style="padding:0 20px;" onclick="postComment()">POST</button>
                        </div>
                        <div id="commentsList"></div>
                    </div>
                </div>
                <div class="theater-right">
                    <div class="sidebar-panel">
                        <div class="panel-title" id="sidebarListHeader">Episodes</div>
                        <div class="vertical-episodes-list" id="sidebarEpisodesWrapper"></div>
                    </div>
                    <div class="sidebar-panel">
                        <div class="panel-title">Seasons</div>
                        <div class="seasons-row-list" id="sidebarSeasonsWrapper"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let libraryData = {};
        let activeAnime = "";
        let activeSeason = "";
        let activeEpNum = "";

        async function initApp() {
            try {
                const response = await fetch('library.json');
                libraryData = await response.json();
                buildRecentGrid();
                const defaultAnime = Object.keys(libraryData)[0];
                if(defaultAnime && libraryData[defaultAnime]) {
                    document.getElementById('heroTitle').innerText = defaultAnime;
                    document.getElementById('heroDesc').innerText = libraryData[defaultAnime].description || "";
                    if(libraryData[defaultAnime].poster) {
                        document.getElementById('heroElement').style.backgroundImage = `linear-gradient(180deg, rgba(19,21,26,0.3) 0%, rgba(11,12,15,1) 100%), url('${libraryData[defaultAnime].poster}')`;
                    }
                }
            } catch (e) { console.error("Database connection configuration sync error:", e); }
            loadStaticScheduleFallback();
        }

        function buildRecentGrid() {
            const grid = document.getElementById('recentGrid');
            grid.innerHTML = '';
            Object.keys(libraryData).forEach(anime => {
                const data = libraryData[anime];
                const card = document.createElement('div');
                card.className = 'release-card';
                card.onclick = () => launchTheaterMode(anime);
                card.innerHTML = `
                    <div class="poster-box">
                        <img src="${data.poster}" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/165x220/13151a/e2e8f0?text=No+Poster'" alt="poster">
                    </div>
                    <div class="release-info">
                        <h4>${anime}</h4>
                        <div class="release-meta"><span>${data.type || 'TV'}</span><span>${data.year || '2023'}</span></div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function launchTheaterMode(animeName, targetSeason = null, targetEp = null) {
            if(!libraryData[animeName]) return;
            activeAnime = animeName;
            showPage('watch');
            const anime = libraryData[animeName];
            document.getElementById('metaTitle').innerText = animeName;
            document.getElementById('metaPoster').src = anime.poster;
            document.getElementById('metaSynopsis').innerText = anime.description || "";
            document.getElementById('metaFormat').innerText = anime.type || "TV";
            document.getElementById('metaYear').innerText = anime.year || "2023";
            activeSeason = targetSeason || Object.keys(anime.seasons)[0];
            buildSeasonSidebarButtons();
            loadEpisodesListSidebar(targetEp);
        }

        function buildSeasonSidebarButtons() {
            const wrapper = document.getElementById('sidebarSeasonsWrapper');
            wrapper.innerHTML = '';
            Object.keys(libraryData[activeAnime].seasons).forEach(season => {
                const btn = document.createElement('button');
                btn.className = `season-btn ${season === activeSeason ? 'active' : ''}`;
                btn.innerText = season;
                btn.onclick = () => { activeSeason = season; buildSeasonSidebarButtons(); loadEpisodesListSidebar(); };
                wrapper.appendChild(btn);
            });
        }

        function loadEpisodesListSidebar(forceSelectEpNum = null) {
            const wrapper = document.getElementById('sidebarEpisodesWrapper');
            wrapper.innerHTML = '';
            document.getElementById('sidebarListHeader').innerText = `Episodes: ${activeSeason}`;
            const eps = libraryData[activeAnime].seasons[activeSeason];
            Object.keys(eps).forEach(num => {
                const ep = eps[num];
                const card = document.createElement('div');
                card.className = 'v-ep-card';
                card.id = `sidebar-ep-${num}`;
                card.onclick = () => playVideoSource(num);
                card.innerHTML = `
                    <img class="v-ep-thumb" src="${ep.photo || libraryData[activeAnime].poster}" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/80x48/1f232b/94a3b8?text=EP'" alt="thumb">
                    <div class="v-ep-info">
                        <h5>EP ${num}: ${ep.title || 'Episode ' + num}</h5>
                        <p>${ep.airDate || 'Aired Link'}</p>
                    </div>
                `;
                wrapper.appendChild(card);
            });
            const defaultEp = forceSelectEpNum || Object.keys(eps)[0];
            if(defaultEp) playVideoSource(defaultEp);
        }

        function playVideoSource(epNum) {
            activeEpNum = epNum;
            const ep = libraryData[activeAnime].seasons[activeSeason][epNum];
            const track = document.getElementById('audioSelect').value;
            const url = ep[track];
            document.querySelectorAll('.v-ep-card').forEach(c => c.classList.remove('active'));
            const activeCard = document.getElementById(`sidebar-ep-${epNum}`);
            if(activeCard) activeCard.classList.add('active');
            document.getElementById('playerStreamTitle').innerText = `${epNum}. ${ep.title || 'Episode ' + epNum}`;
            document.getElementById('playerEpisodeDesc').innerText = ep.description || 'No summary text available for this timeline segment.';
            const player = document.getElementById('mainPlayer');
            if(!url || url.trim() === "") {
                player.src = "";
                alert("The requested audio track route has no streaming link assigned inside library.json!");
                return;
            }
            player.src = url;
            player.load();
            player.play();
            loadComments();
        }

        function syncAudioTrackChange() {
            if(activeAnime && activeSeason && activeEpNum) playVideoSource(activeEpNum);
        }

        function quickWatchHero() {
            const firstAnime = Object.keys(libraryData)[0];
            if(firstAnime) launchTheaterMode(firstAnime);
        }

        function searchLibrary(e) {
            const val = e.target.value.toLowerCase().trim();
            if(!val || e.key !== 'Enter') return;
            const match = Object.keys(libraryData).find(name => name.toLowerCase().includes(val));
            if(match) { launchTheaterMode(match); e.target.value = ''; }
        }

        function loadComments() {
            const list = document.getElementById('commentsList');
            list.innerHTML = '';
            const storageKey = `comments-${activeAnime}-${activeSeason}-${activeEpNum}`;
            const records = JSON.parse(localStorage.getItem(storageKey)) || [];
            records.forEach(text => {
                const block = document.createElement('div');
                block.className = 'comment-item';
                block.innerHTML = `<div class="comment-avatar">U</div><div><h5>Anonymous Viewer</h5><p>${text}</p></div>`;
                list.appendChild(block);
            });
        }

        function postComment() {
            const input = document.getElementById('commentInput');
            if(!input.value.trim()) return;
            const storageKey = `comments-${activeAnime}-${activeSeason}-${activeEpNum}`;
            const records = JSON.parse(localStorage.getItem(storageKey)) || [];
            records.unshift(input.value);
            localStorage.setItem(storageKey, JSON.stringify(records));
            input.value = '';
            loadComments();
        }

        function loadStaticScheduleFallback() {
            document.getElementById('scheduleList').innerHTML = `
                <div class="schedule-item"><div><strong>The Apothecary Diaries (Season 2)</strong></div><div class="schedule-time">19:30</div></div>
                <div class="schedule-item"><div><strong>Chikawa</strong></div><div class="schedule-time">04:10</div></div>
                <div class="schedule-item"><div><strong>Liar Game (New Series)</strong></div><div class="schedule-time">08:30</div></div>
            `;
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            document.getElementById(`tab-${id}`).classList.add('active');
        }

        window.onload = initApp;
    </script>
</body>
</html>
