<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRURO.tv - Ultimate Private Stream</title>
    <!-- Include FontAwesome for matching control bar iconography -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0c0f;
            --bg-card: #13151a;
            --bg-border: #1f232b;
            --accent: #a855f7;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: #050507;
            border-bottom: 1px solid var(--bg-border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .logo { font-weight: 900; font-size: 20px; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-item { cursor: pointer; font-weight: 600; color: var(--text-muted); }
        .nav-item.active { color: var(--accent); }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }

        /* Homepage Grid */
        .releases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 15px; }
        .release-card { background: var(--bg-card); border: 1px solid var(--bg-border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
        .release-card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .poster-box { height: 220px; background: #1f232b; position: relative; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; }
        .release-info { padding: 10px; font-size: 13px; }
        .release-info h4 { margin: 0 0 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; }

        /* Premium Theater Layout */
        .theater-layout { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        .theater-left { flex: 1; min-width: 60%; }
        .theater-right { width: 360px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; }
        @media (max-width: 1000px) { .theater-right { width: 100%; } }
        
        /* Premium Player UI Container */
        .video-box { background: #000; width: 100%; border-radius: 8px; overflow: hidden; border: 1px solid var(--bg-border); position: relative; }
        video { width: 100%; aspect-ratio: 16/9; display: block; outline: none; }
        
        /* Custom Control Bar (Mark 1 Element) */
        .custom-player-controls {
            background: rgba(11, 12, 15, 0.9);
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid var(--bg-border);
        }
        .controls-progress-row { display: flex; align-items: center; gap: 10px; }
        .progress-bar-container { flex: 1; height: 5px; background: #2e3342; position: relative; border-radius: 3px; cursor: pointer; }
        .progress-filled { width: 0%; height: 100%; background: var(--accent); border-radius: 3px; }
        .time-display { font-size: 12px; font-family: monospace; color: var(--text-muted); }
        
        .controls-buttons-row { display: flex; align-items: center; justify-content: space-between; }
        .left-buttons, .right-buttons { display: flex; align-items: center; gap: 18px; }
        .control-btn { background: none; border: none; color: white; cursor: pointer; font-size: 14px; transition: color 0.2s; padding: 0; }
        .control-btn:hover { color: var(--accent); }
        
        /* Macro Automation Toggles Bar */
        .automation-toggles-bar {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: var(--text-muted);
            padding: 5px 15px;
            background: #101216;
            border-bottom: 1px solid var(--bg-border);
        }
        .toggle-item { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .toggle-item input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; margin: 0; }
        
        /* Premium Metadata & Action Module (Mark 2 Element) */
        .premium-metadata-module {
            padding: 20px 0;
            border-bottom: 1px solid var(--bg-border);
        }
        .meta-top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; margin-bottom: 12px; }
        .meta-title-area h2 { font-size: 22px; margin: 0 0 5px 0; color: white; font-weight: 700; }
        .meta-selectors { display: flex; gap: 8px; }
        .meta-dropdown { background: var(--bg-card); border: 1px solid var(--bg-border); color: white; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; }
        
        .meta-stats-line { display: flex; flex-wrap: wrap; align-items: center; gap: 15px; font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
        .stat-badge { display: flex; align-items: center; gap: 5px; background: #1c1e24; padding: 3px 8px; border-radius: 4px; color: white; }
        
        .action-buttons-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .action-icon-btn { background: #1c1e24; border: 1px solid var(--bg-border); color: white; padding: 6px 14px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .action-icon-btn:hover { background: var(--accent); border-color: var(--accent); }
        
        .synopsis-text { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin: 0; }

        /* General UI components */
        .sidebar-panel { background: var(--bg-card); border: 1px solid var(--bg-border); border-radius: 8px; padding: 15px; }
        .panel-title { font-size: 14px; font-weight: bold; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; border-bottom: 1px solid var(--bg-border); padding-bottom: 6px; }
        .vertical-episodes-list { max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .v-ep-card { background: var(--bg-main); border: 1px solid var(--bg-border); border-radius: 6px; padding: 8px; display: flex; gap: 10px; cursor: pointer; transition: all 0.2s; }
        .v-ep-card:hover, .v-ep-card.active { border-color: var(--accent); background: #151821; }
        .v-ep-thumb { width: 80px; height: 48px; border-radius: 4px; object-fit: cover; background: #1f232b; flex-shrink: 0; }
        .v-ep-info { overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        .v-ep-info h5 { margin: 0 0 2px 0; font-size: 12px; color: white; }

        .info-card-block { background: var(--bg-card); border: 1px solid var(--bg-border); border-radius: 8px; padding: 20px; margin-top: 20px; display: flex; gap: 20px; }
        .info-poster { width: 140px; height: 200px; border-radius: 6px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--bg-border); }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')">MIRURO<span>.tv CLONE</span></div>
        <div class="nav-links">
            <div class="nav-item active" id="tab-home" onclick="showPage('home')">Home</div>
            <div class="nav-item" id="tab-watch" onclick="showPage('watch')">Watch Panel</div>
        </div>
    </nav>

    <div class="container">
        <!-- HOME PAGE -->
        <div class="page active" id="page-home">
            <div class="section-header"><h2>Explore Library</h2></div>
            <div class="releases-grid" id="recentGrid"></div>
        </div>

        <!-- WATCH SCREEN -->
        <div class="page" id="page-watch">
            <div class="theater-layout">
                <div class="theater-left">
                    
                    <!-- PREMIUM VIDEO PLAYER WRAPPER (MARK 1) -->
                    <div class="video-box">
                        <video id="mainPlayer" playsinline></video>
                        
                        <!-- Automation Option Row -->
                        <div class="automation-toggles-bar">
                            <label class="toggle-item"><input type="checkbox" id="toggleAutoplay" checked> Autoplay</label>
                            <label class="toggle-item"><input type="checkbox" id="toggleAutoSkip" checked> Auto Skip</label>
                            <label class="toggle-item"><input type="checkbox" id="toggleAutoNext" checked> Auto Next</label>
                        </div>

                        <!-- Core Controls Deck -->
                        <div class="custom-player-controls">
                            <div class="controls-progress-row">
                                <div class="progress-bar-container" id="progressContainer">
                                    <div class="progress-filled" id="progressFilled"></div>
                                </div>
                                <div class="time-display" id="timeText">0:00 / 0:00</div>
                            </div>
                            <div class="controls-buttons-row">
                                <div class="left-buttons">
                                    <button class="control-btn" id="playBtn" onclick="togglePlayState()"><i class="fas fa-play"></i></button>
                                    <button class="control-btn" onclick="skipForward(85)"><i class="fas fa-step-forward"></i></button>
                                </div>
                                <div class="right-buttons">
                                    <button class="control-btn" onclick="modifyVideoTimeline(-10)"><i class="fas fa-undo"></i></button>
                                    <button class="control-btn" onclick="modifyVideoTimeline(10)"><i class="fas fa-redo"></i></button>
                                    <button class="control-btn" id="directDownloadIconBtn" onclick="triggerFileDownload()"><i class="fas fa-download"></i></button>
                                    <button class="control-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- DETAILED METADATA & ACTION BAR (MARK 2) -->
                    <div class="premium-metadata-module">
                        <div class="meta-top-row">
                            <div class="meta-title-area">
                                <h2 id="playerStreamTitle">Episode Name</h2>
                            </div>
                            <div class="meta-selectors">
                                <select class="meta-dropdown" id="audioSelect" onchange="syncAudioTrackChange()">
                                    <option value="sub">Subbed (JPN)</option>
                                    <option value="dub">Audio: Dubbed (ENG)</option>
                                </select>
                                <select class="meta-dropdown">
                                    <option>Server: Kiwi</option>
                                </select>
                            </div>
                        </div>

                        <div class="meta-stats-line">
                            <span id="metaAirDateText">Airing Timeline</span>
                            <span class="stat-badge"><i class="fas fa-folder"></i> <span id="metaTotalEpsBadge">24</span></span>
                            <span class="stat-badge"><i class="fas fa-microphone"></i> <span id="metaAvailableAudioBadge">24</span></span>
                        </div>

                        <div class="action-buttons-row">
                            <button class="action-icon-btn"><i class="fas fa-flag"></i> Report</button>
                            <button class="action-icon-btn" id="mainDownloadActionButton" onclick="triggerFileDownload()"><i class="fas fa-download"></i> Download</button>
                            <button class="action-icon-btn"><i class="fas fa-share-alt"></i> Share</button>
                        </div>

                        <p class="synopsis-text" id="playerEpisodeDesc">Loading tracking documentation sync files...</p>
                    </div>

                    <!-- MAL Summary Component -->
                    <div class="info-card-block">
                        <img class="info-poster" id="metaPoster" src="" referrerpolicy="no-referrer" alt="poster">
                        <div class="info-details">
                            <h3 id="metaTitle" style="margin:0; font-size:22px; color:white;">Anime Title</h3>
                            <p id="metaSynopsis" style="color: var(--text-muted); margin: 15px 0; font-size: 13px; line-height: 1.6;"></p>
                        </div>
                    </div>
                </div>

                <div class="theater-right">
                    <div class="sidebar-panel">
                        <div class="panel-title" id="sidebarListHeader">Episodes</div>
                        <div class="vertical-episodes-list" id="sidebarEpisodesWrapper"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let libraryData = {};
        let activeAnime = "";
        let activeSeason = "Season 1";
        let activeEpNum = "";
        let currentFetchedPoster = "";
        const video = document.getElementById('mainPlayer');

        async function initApp() {
            try {
                const response = await fetch('library.json');
                libraryData = await response.json();
                buildRecentGrid();
            } catch (e) { console.error("Database connection failure:", e); }
        }

        function buildRecentGrid() {
            const grid = document.getElementById('recentGrid');
            grid.innerHTML = '';
            Object.keys(libraryData).forEach(anime => {
                const card = document.createElement('div');
                card.className = 'release-card';
                card.onclick = () => launchTheaterMode(anime);
                
                const localImage = anime === 'The Apothecary Diaries' ? 'https://viulg178.github.io/anime-hub/apothecary.jpg' : 'https://viulg178.github.io/anime-hub/pseudo-harem.jpg';
                
                card.innerHTML = `
                    <div class="poster-box">
                        <img id="home-thumb-${anime.replace(/\s+/g, '')}" src="${localImage}" alt="poster">
                    </div>
                    <div class="release-info"><h4>${anime}</h4></div>
                `;
                grid.appendChild(card);
                fetchAutomatedMetadata(anime, false);
            });
        }

        async function fetchAutomatedMetadata(animeName, updateWatchPanel = false) {
            try {
                const searchName = animeName === 'The Apothecary Diaries' ? 'Kusuriya no Hitorigoto' : animeName;
                const response = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(searchName)}&limit=1`);
                const resData = await response.json();
                
                if (resData.data && resData.data[0]) {
                    const malData = resData.data[0];
                    const officialHighResPoster = malData.images.webp.large_image_url;
                    
                    if (updateWatchPanel && activeAnime === animeName) {
                        currentFetchedPoster = officialHighResPoster;
                        document.getElementById('metaPoster').src = officialHighResPoster;
                        document.getElementById('metaSynopsis').innerText = malData.synopsis;
                        document.getElementById('metaTitle').innerText = malData.title_english || malData.title;
                        
                        document.querySelectorAll('.v-ep-thumb').forEach(img => {
                            img.onerror = function() { this.src = officialHighResPoster; this.onerror = null; };
                            if (img.naturalWidth === 0) img.src = img.src; 
                        });
                    }

                    const homeImg = document.getElementById(`home-thumb-${animeName.replace(/\s+/g, '')}`);
                    if (homeImg) homeImg.src = officialHighResPoster;
                }
            } catch (err) { console.error("Jikan API query failure:", err); }
        }

        function launchTheaterMode(animeName) {
            if(!libraryData[animeName]) return;
            activeAnime = animeName;
            currentFetchedPoster = "";
            showPage('watch');
            
            const localImage = animeName === 'The Apothecary Diaries' ? 'https://viulg178.github.io/anime-hub/apothecary.jpg' : 'https://viulg178.github.io/anime-hub/pseudo-harem.jpg';
            document.getElementById('metaPoster').src = localImage;
            
            loadEpisodesListSidebar();
            fetchAutomatedMetadata(animeName, true);
        }

        function loadEpisodesListSidebar() {
            const wrapper = document.getElementById('sidebarEpisodesWrapper');
            wrapper.innerHTML = '';
            const eps = libraryData[activeAnime].seasons[activeSeason];
            const imagePath = activeAnime === 'The Apothecary Diaries' ? 'https://viulg178.github.io/anime-hub/apothecary.jpg' : 'https://viulg178.github.io/anime-hub/pseudo-harem.jpg';
            
            // Sync metadata statistics line counts dynamically
            const totalCount = Object.keys(eps).length;
            document.getElementById('metaTotalEpsBadge').innerText = totalCount;
            document.getElementById('metaAvailableAudioBadge').innerText = totalCount;

            Object.keys(eps).forEach(num => {
                const card = document.createElement('div');
                card.className = 'v-ep-card';
                card.id = `sidebar-ep-${num}`;
                card.onclick = () => playVideoSource(num);
                card.innerHTML = `
                    <img class="v-ep-thumb" src="${imagePath}" onerror="if(currentFetchedPoster) { this.src = currentFetchedPoster; this.onerror = null; }" alt="thumb">
                    <div class="v-ep-info"><h5>Episode ${num}</h5></div>
                `;
                wrapper.appendChild(card);
            });
            playVideoSource(Object.keys(eps)[0]);
        }

        function playVideoSource(epNum) {
            activeEpNum = epNum;
            const ep = libraryData[activeAnime].seasons[activeSeason][epNum];
            const track = document.getElementById('audioSelect').value;
            const url = ep[track];

            document.querySelectorAll('.v-ep-card').forEach(c => c.classList.remove('active'));
            const activeCard = document.getElementById(`sidebar-ep-${epNum}`);
            if(activeCard) activeCard.classList.add('active');

            // Set Title & Context Elements inside Module
            document.getElementById('playerStreamTitle').innerText = `${epNum}. ${ep.title || 'Episode ' + epNum}`;
            document.getElementById('playerEpisodeDesc').innerText = ep.description || 'No specific segment summary provided.';
            document.getElementById('metaAirDateText').innerText = ep.airDate || 'Aired Timeline';

            if(!url) {
                alert("Target streaming route file missing inside configuration index!");
                return;
            }

            video.src = url;
            video.load();
            
            if(document.getElementById('toggleAutoplay').checked) {
                video.play().catch(err => console.log("Autoplay permission intercept caught."));
            }
        }

        /* CUSTOM CONTROLS RUNTIME ENGINE (MARK 1 FUNCTIONS) */
        function togglePlayState() {
            if(video.paused) {
                video.play();
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                video.pause();
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
            }
        }

        video.addEventListener('play', () => {
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        });

        video.addEventListener('pause', () => {
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
        });

        video.addEventListener('timeupdate', () => {
            const current = video.currentTime;
            const duration = video.duration || 0;
            
            // Progress Bar Sync
            const pct = (current / duration) * 100 || 0;
            document.getElementById('progressFilled').style.width = `${pct}%`;
            
            // Time Sync Display formatting
            document.getElementById('timeText').innerText = `${formatTimeMarkup(current)} / ${formatTimeMarkup(duration)}`;
            
            // Auto-Skip function logic (Skips initial 85s if option flagged active)
            if(current < 85 && document.getElementById('toggleAutoSkip').checked) {
                video.currentTime = 85;
            }
        });

        // Auto-Next Event Handler Trigger
        video.addEventListener('ended', () => {
            if(document.getElementById('toggleAutoNext').checked) {
                const currentEps = libraryData[activeAnime].seasons[activeSeason];
                const nextNum = parseInt(activeEpNum) + 1;
                if(currentEps[nextNum]) {
                    playVideoSource(nextNum.toString());
                }
            }
        });

        document.getElementById('progressContainer').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        });

        function modifyVideoTimeline(seconds) {
            video.currentTime += seconds;
        }

        function skipForward(seconds) {
            video.currentTime = seconds;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                video.parentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        function formatTimeMarkup(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        /* DYNAMIC FILE STREAMING DIRECT DOWNLOAD ROUTE (MARK 2 FUNCTIONS) */
        function triggerFileDownload() {
            const ep = libraryData[activeAnime].seasons[activeSeason][activeEpNum];
            const track = document.getElementById('audioSelect').value;
            const downloadUrl = ep[track];

            if(!downloadUrl) {
                alert("The selected audio track asset does not have a functional download url endpoint available.");
                return;
            }
            // Open direct stream pipeline route instantly into dedicated user file allocation window context
            window.open(downloadUrl, '_blank');
        }

        function syncAudioTrackChange() {
            if(activeAnime && activeEpNum) playVideoSource(activeEpNum);
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            document.getElementById(`tab-${id}`).classList.add('active');
        }

        window.onload = initApp;
    </script>
</body>
</html>
