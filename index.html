<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRURO.tv - Private Stream</title>
    <style>
        :root {
            --bg-main: #0b0c0f;
            --bg-card: #13151a;
            --bg-border: #1f232b;
            --accent: #a855f7;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: #050507;
            border-bottom: 1px solid var(--bg-border);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { font-weight: 900; font-size: 20px; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-item { cursor: pointer; font-weight: 600; color: var(--text-muted); }
        .nav-item.active { color: var(--accent); }
        
        .video-wrapper { background: #000; width: 100%; max-width: 1060px; margin: 0 auto; display: none; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        
        .container { max-width: 1060px; margin: 0 auto; padding: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        
        .selectors { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        select {
            background: var(--bg-card);
            border: 1px solid var(--bg-border);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        
        /* Premium Miruro Episode Cards Style Layout */
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .ep-card {
            background: var(--bg-card);
            border: 1px solid var(--bg-border);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .ep-card:hover { border-color: var(--accent); background: #1a1d24; }
        
        .ep-thumb-box {
            width: 110px;
            height: 65px;
            background: #1f232b;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }
        .ep-thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .ep-badge {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0,0,0,0.8);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 9px;
            color: white;
            font-weight: bold;
        }
        
        .ep-info { display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .ep-info h4 { margin: 0 0 4px 0; font-size: 13px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ep-info p { margin: 0; font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .schedule-row {
            background: var(--bg-card);
            border: 1px solid var(--bg-border);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .time { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')">MIRURO<span>.tv</span></div>
        <div class="nav-links">
            <div class="nav-item active" id="tab-home" onclick="showPage('home')">Home</div>
            <div class="nav-item" id="tab-library" onclick="showPage('library')">My Anime</div>
        </div>
        <div style="font-size: 13px; color: var(--accent); font-weight: bold;">● ONLINE NODE</div>
    </nav>

    <div class="video-wrapper" id="playerArea">
        <video id="mainPlayer" controls></video>
    </div>

    <div class="container">
        
        <!-- HOME PAGE -->
        <div class="page active" id="page-home">
            <h2 style="border-left: 4px solid var(--accent); padding-left: 10px; font-size: 18px;">Estimated Airing Schedule</h2>
            <div id="scheduleContainer">Loading schedule items...</div>
        </div>

        <!-- LIBRARY PAGE -->
        <div class="page" id="page-library">
            <h2 style="border-left: 4px solid var(--accent); padding-left: 10px; font-size: 18px; margin-bottom: 20px;">My Anime Library</h2>
            <div class="selectors">
                <select id="animeSelect" onchange="updateSeasonsDropdown()"><option value="">-- Choose Anime --</option></select>
                <select id="seasonSelect" onchange="renderEpisodesGrid()" disabled><option value="">-- Choose Season --</option></select>
                <select id="audioSelect" onchange="renderEpisodesGrid()">
                    <option value="sub">Audio Track: Subbed (JPN)</option>
                    <option value="dub">Audio Track: Dubbed (ENG)</option>
                </select>
            </div>
            <div class="episodes-grid" id="episodesGrid"></div>
        </div>

    </div>

    <script>
        let libraryData = {};

        async function loadPortalData() {
            try {
                const response = await fetch('library.json');
                libraryData = await response.json();
                
                const animeDropdown = document.getElementById('animeSelect');
                Object.keys(libraryData).forEach(anime => {
                    let opt = document.createElement('option');
                    opt.value = anime;
                    opt.innerText = anime;
                    animeDropdown.appendChild(opt);
                });
            } catch (e) { console.error("Error accessing library.json profile", e); }
            loadAiringSchedule();
        }

        function updateSeasonsDropdown() {
            const anime = document.getElementById('animeSelect').value;
            const seasonDropdown = document.getElementById('seasonSelect');
            seasonDropdown.innerHTML = '<option value="">-- Choose Season --</option>';
            document.getElementById('episodesGrid').innerHTML = '';

            if (!anime || !libraryData[anime]) {
                seasonDropdown.disabled = true;
                return;
            }

            Object.keys(libraryData[anime]).forEach(season => {
                let opt = document.createElement('option');
                opt.value = season;
                opt.innerText = season;
                seasonDropdown.appendChild(opt);
            });
            seasonDropdown.disabled = false;
        }

        function renderEpisodesGrid() {
            const anime = document.getElementById('animeSelect').value;
            const season = document.getElementById('seasonSelect').value;
            const audio = document.getElementById('audioSelect').value;
            const grid = document.getElementById('episodesGrid');
            grid.innerHTML = '';

            if (!anime || !season) return;

            const episodes = libraryData[anime][season];
            Object.keys(episodes).forEach(num => {
                const ep = episodes[num];
                
                // Fallback image poster if user leaves photo url blank in library.json
                const imageSrc = ep.photo || "https://cdn.myanimelist.net/images/anime/1708/138033.jpg";
                const airDate = ep.airDate || "Active Link Route";

                const card = document.createElement('div');
                card.className = 'ep-card';
                card.onclick = () => playStream(ep[audio], `${anime} - S${season} Ep ${num}`);
                
                card.innerHTML = `
                    <div class="ep-thumb-box">
                        <img src="${imageSrc}" alt="thumbnail">
                        <div class="ep-badge">EP ${num}</div>
                    </div>
                    <div class="ep-info">
                        <h4>${ep.title || 'Episode ' + num}</h4>
                        <p>${airDate}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function playStream(url, displayTitle) {
            if (!url || url.trim() === "") {
                alert("This option language track link is currently unassigned inside library.json!");
                return;
            }
            document.getElementById('playerArea').style.display = 'block';
            const v = document.getElementById('mainPlayer');
            v.src = url;
            v.load();
            v.play();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        async function loadAiringSchedule() {
            const container = document.getElementById('scheduleContainer');
            try {
                const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
                const today = days[new Date().getDay()];
                const res = await fetch(`https://api.jikan.moe/v4/schedules?filter=${today}`);
                const data = await res.json();
                
                container.innerHTML = '';
                data.data.slice(0, 6).forEach(item => {
                    let row = document.createElement('div');
                    row.className = 'schedule-row';
                    row.innerHTML = `<div><strong>${item.title}</strong></div><div class="time">${item.broadcast.time || 'Airing'}</div>`;
                    container.appendChild(row);
                });
            } catch(e) { container.innerHTML = '<div class="schedule-row">System online. Complete data routes.</div>'; }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            document.getElementById(`tab-${pageId}`).classList.add('active');
        }

        window.onload = loadPortalData;
    </script>
</body>
</html>
